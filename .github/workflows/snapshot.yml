name: Daily options snapshot
on:
  schedule:
    - cron: '15 0 * * *'    # รอบหลัก 00:15 UTC (~07:15 เวลาไทย)
    - cron: '15 12 * * *'   # รอบ catch-up: ทำงานเฉพาะเมื่อรอบเช้าพลาด (สคริปต์ข้ามไฟล์ที่มีแล้ว)
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['scripts/**', '.github/workflows/snapshot.yml']

permissions:
  contents: write
  actions: write
  issues: write

concurrency:
  group: snapshot
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch option chains
        env:
          # scheduled runs never overwrite an existing daily file; manual and
          # push-triggered runs always refresh so testing changes stays easy
          SKIP_IF_EXISTS: ${{ github.event_name == 'schedule' && '1' || '' }}
        run: python3 scripts/fetch_chain.py

      - name: Commit snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Snapshot $(date -u +%Y-%m-%d)"
            git push
          fi

      # การเรียก enable ซ้ำเป็น no-op แต่รีเซ็ตตัวนับ 60 วันที่ GitHub ใช้
      # พัก scheduled workflow ของ repo ที่ไม่มีความเคลื่อนไหว
      - name: Keep scheduled workflow alive
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh api -X PUT "repos/${{ github.repository }}/actions/workflows/snapshot.yml/enable"

      - name: Open issue on failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          title="Snapshot failed $(date -u +%Y-%m-%d)"
          body="Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          existing=$(gh issue list --repo "${{ github.repository }}" --state open --search "in:title \"$title\"" --json number --jq '.[0].number')
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --repo "${{ github.repository }}" --body "$body"
          else
            gh issue create --repo "${{ github.repository }}" --title "$title" --body "$body"
          fi
